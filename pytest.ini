[pytest]
# Pytest configuration file

# Путь к тестам
testpaths = tests

# Паттерны для поиска тестовых файлов
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Опции по умолчанию
addopts =
    # Показывать краткую информацию о прогрессе
    --verbose
    # Показывать локальные переменные при ошибках
    --showlocals
    # Останавливаться на первой ошибке (раскомментируйте при необходимости)
    # --exitfirst
    # Покрытие кода (требует pytest-cov)
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    # Строгие маркеры
    --strict-markers
    # Цветной вывод
    --color=yes
    # Подробный вывод для медленных тестов
    --durations=10

# Маркеры для категоризации тестов
markers =
    unit: Unit tests (быстрые, изолированные)
    integration: Integration tests (требуют внешних ресурсов)
    slow: Slow tests (долгие тесты, например с браузером)
    asyncio: Async tests (требуют pytest-asyncio)
    browser: Tests requiring browser (требуют запущенный браузер)
    api: Tests requiring API connection (требуют API ключ)

# Таймауты для тестов (требует pytest-timeout)
timeout = 300
timeout_method = thread

# Async настройки (для pytest-asyncio)
asyncio_mode = auto

# Игнорировать предупреждения
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Минимальная версия Python
minversion = 3.10
